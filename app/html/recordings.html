<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MediaMTX Recordings</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  header {
    padding: 10px 14px;
    border-bottom: 1px solid rgba(128,128,128,.35);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; }
  header .sub { font-size: 12px; opacity: .65; }
  header nav { margin-left: auto; display: flex; gap: 4px; }
  header nav a {
    font-size: 12.5px;
    text-decoration: none;
    color: inherit;
    padding: 5px 10px;
    border: 1px solid rgba(128,128,128,.5);
    border-radius: 6px;
  }
  header nav a.active { background: rgba(128,128,128,.18); font-weight: 600; }
  header nav a:hover { background: rgba(128,128,128,.12); }
  .toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 14px;
    padding: 10px 14px;
    border-bottom: 1px solid rgba(128,128,128,.35);
    align-items: flex-end;
  }
  .field { display: flex; flex-direction: column; gap: 3px; }
  .field label { font-size: 11px; opacity: .7; }
  input, select, button {
    font: inherit;
    padding: 6px 10px;
    border: 1px solid rgba(128,128,128,.5);
    border-radius: 6px;
    background: rgba(128,128,128,.08);
  }
  button { cursor: pointer; }
  button:hover { background: rgba(128,128,128,.18); }
  button.primary { border-color: #2d7; background: #2d7; color: #062; font-weight: 600; }
  button.danger { border-color: #d9534f; color: #d9534f; }
  #status { margin-left: auto; font-size: 12.5px; min-height: 18px; }
  .ok { color: #2a9d4a; }
  .err { color: #d9534f; }
  main { flex: 1 1 auto; overflow: auto; padding: 0; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 8px 14px; border-bottom: 1px solid rgba(128,128,128,.2); }
  th { position: sticky; top: 0; background: Canvas; font-weight: 600; font-size: 12px; opacity: .8; }
  td.size, td.end, td.actions { white-space: nowrap; }
  tr:hover td { background: rgba(128,128,128,.08); }
  .empty { padding: 24px 14px; opacity: .6; font-size: 13px; }
  #playerWrap {
    border-top: 1px solid rgba(128,128,128,.35);
    display: none;
    padding: 10px 14px;
    background: rgba(128,128,128,.05);
  }
  #playerWrap.open { display: block; }
  #playerWrap .row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  #playerWrap .name { font-size: 12.5px; font-weight: 600; word-break: break-all; }
  video { width: 100%; max-height: 50vh; background: #000; border-radius: 6px; }

  /* --- VMS timeline --- */
  #vms { border-bottom: 1px solid rgba(128,128,128,.35); padding: 10px 14px; }
  .vmsBar { display: flex; flex-wrap: wrap; gap: 8px 14px; align-items: flex-end; margin-bottom: 10px; }
  .vmsBar .hint { font-size: 11.5px; opacity: .55; align-self: center; }
  #tlMsg { font-size: 12.5px; margin-left: auto; align-self: center; }
  #tlWrap { position: relative; user-select: none; touch-action: none; }
  #tlRuler { position: relative; height: 15px; font-size: 10px; opacity: .65; }
  #tlRuler span { position: absolute; transform: translateX(-50%); white-space: nowrap; }
  #tlBar {
    position: relative;
    height: 36px;
    background: rgba(128,128,128,.10);
    border: 1px solid rgba(128,128,128,.35);
    border-radius: 6px;
    overflow: hidden;
    cursor: crosshair;
  }
  .tlTick { position: absolute; top: 0; bottom: 0; width: 1px; background: rgba(128,128,128,.22); pointer-events: none; }
  .tlSpan { position: absolute; top: 0; bottom: 0; background: #2d7; opacity: .55; pointer-events: none; }
  #tlSel {
    position: absolute; top: 0; bottom: 0;
    background: rgba(80,140,255,.35);
    border-left: 1px solid rgba(80,140,255,.9);
    border-right: 1px solid rgba(80,140,255,.9);
    display: none; pointer-events: none;
  }
  #tlPlayhead { position: absolute; top: 0; bottom: 0; width: 2px; background: #d9534f; display: none; pointer-events: none; }
  #tlSelBar { display: none; gap: 8px; align-items: center; margin-top: 8px; font-size: 12.5px; }
</style>
</head>
<body>
  <header>
    <h1>MediaMTX Recordings</h1>
    <span class="sub">Stored segments</span>
    <nav>
      <a href="index.html">Configuration</a>
      <a href="live.html">Live</a>
      <a href="recordings.html" class="active">Recordings</a>
    </nav>
  </header>

  <div id="vms">
    <div class="vmsBar">
      <div class="field">
        <label for="tlStream">Stream</label>
        <select id="tlStream"></select>
      </div>
      <div class="field">
        <label for="tlDate">Day</label>
        <span>
          <button id="tlPrev" title="Previous day">&#9664;</button>
          <input type="date" id="tlDate">
          <button id="tlNext" title="Next day">&#9654;</button>
          <button id="tlToday">Today</button>
        </span>
      </div>
      <span class="hint">Click the timeline to play from that moment &mdash; drag to select a range to export.</span>
      <span id="tlMsg"></span>
    </div>
    <div id="tlWrap">
      <div id="tlRuler"></div>
      <div id="tlBar">
        <div id="tlSel"></div>
        <div id="tlPlayhead"></div>
      </div>
    </div>
    <div id="tlSelBar">
      <span id="tlSelInfo"></span>
      <button id="tlSelPlay" class="primary">Play selection</button>
      <button id="tlSelDl">Download MP4</button>
      <button id="tlSelClear">Clear</button>
    </div>
  </div>

  <div id="playerWrap">
    <div class="row">
      <span class="name" id="playName"></span>
      <button id="closePlayer" style="margin-left:auto">Close</button>
    </div>
    <video id="player" controls preload="metadata"></video>
  </div>

  <div class="toolbar">
    <div class="field">
      <label for="stream">Stream</label>
      <select id="stream"><option value="">All</option></select>
    </div>
    <div class="field">
      <label for="from">From</label>
      <input type="datetime-local" id="from">
    </div>
    <div class="field">
      <label for="to">To</label>
      <input type="datetime-local" id="to">
    </div>
    <button id="clear">Clear filter</button>
    <button id="reload" class="primary">Refresh</button>
    <span id="storage" style="font-size:12px;opacity:.7"></span>
    <span id="status"></span>
  </div>

  <main>
    <table id="table">
      <thead>
        <tr>
          <th>Stream</th>
          <th>Start time</th>
          <th>End time</th>
          <th>Size</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div id="empty" class="empty" style="display:none">No recordings found.</div>
  </main>

  <script>
    const statusEl = document.getElementById('status');
    const rows = document.getElementById('rows');
    const emptyEl = document.getElementById('empty');
    const streamSel = document.getElementById('stream');
    const fromEl = document.getElementById('from');
    const toEl = document.getElementById('to');
    const playerWrap = document.getElementById('playerWrap');
    const player = document.getElementById('player');
    const playName = document.getElementById('playName');

    let items = [];

    function setStatus(msg, kind) {
      statusEl.textContent = msg;
      statusEl.className = kind || '';
    }

    function fmtSize(n) {
      if (n < 1024) return n + ' B';
      const u = ['KB', 'MB', 'GB', 'TB'];
      let i = -1;
      do { n /= 1024; i++; } while (n >= 1024 && i < u.length - 1);
      return n.toFixed(1) + ' ' + u[i];
    }

    function fmtTime(d) {
      if (!d) return '-';
      const p = (x) => String(x).padStart(2, '0');
      return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate()) +
             ' ' + p(d.getHours()) + ':' + p(d.getMinutes()) + ':' + p(d.getSeconds());
    }

    // Split "stream/sub/2026-06-30_14-30-00-000000.mp4" into stream + start Date.
    function parseItem(it) {
      const parts = it.path.split('/');
      const file = parts.pop();
      const stream = parts.join('/') || '(root)';
      let start = null;
      const m = file.match(/(\d{4})-(\d{2})-(\d{2})[_T](\d{2})-(\d{2})-(\d{2})/);
      if (m) {
        start = new Date(+m[1], +m[2] - 1, +m[3], +m[4], +m[5], +m[6]);
      } else if (it.mtime) {
        start = new Date(it.mtime * 1000);
      }
      const end = it.mtime ? new Date(it.mtime * 1000) : null;
      return { ...it, stream, start, end };
    }

    async function load() {
      setStatus('Loading...');
      rows.innerHTML = '';
      try {
        const res = await fetch('config.cgi?action=recordings', { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        items = data.map(parseItem).sort((a, b) => (b.start || 0) - (a.start || 0));
        populateStreams();
        render();
        setStatus(items.length + ' recording' + (items.length === 1 ? '' : 's'), 'ok');
      } catch (e) {
        setStatus('Load failed: ' + e.message, 'err');
      }
      loadStorage();
    }

    async function loadStorage() {
      const el = document.getElementById('storage');
      try {
        const res = await fetch('config.cgi?action=storage', { cache: 'no-store' });
        const st = await res.json();
        if (st.ok) {
          el.textContent = 'Storage: ' + fmtSize(st.total - st.free) + ' used of ' +
                           fmtSize(st.total) + ' (' + fmtSize(st.free) + ' free)';
        } else {
          el.textContent = '';
        }
      } catch (e) {
        el.textContent = '';
      }
    }

    async function deleteRecording(it) {
      if (!confirm('Delete this recording?\n\n' + it.path)) return;
      setStatus('Deleting...');
      try {
        const res = await fetch('config.cgi?action=delete&file=' +
                                encodeURIComponent(it.path), { method: 'POST' });
        const out = await res.json().catch(() => null);
        if (!res.ok || !out || !out.ok)
          throw new Error((out && out.error) || 'HTTP ' + res.status);
        items = items.filter((x) => x !== it);
        populateStreams();
        render();
        setStatus('Deleted', 'ok');
        loadStorage();
      } catch (e) {
        setStatus('Delete failed: ' + e.message, 'err');
      }
    }

    function populateStreams() {
      const cur = streamSel.value;
      const names = [...new Set(items.map(i => i.stream))].sort();
      streamSel.innerHTML = '<option value="">All</option>' +
        names.map(n => `<option>${n}</option>`).join('');
      if (names.includes(cur)) streamSel.value = cur;
    }

    function render() {
      const stream = streamSel.value;
      const from = fromEl.value ? new Date(fromEl.value) : null;
      const to = toEl.value ? new Date(toEl.value) : null;
      const filtered = items.filter(i => {
        if (stream && i.stream !== stream) return false;
        if (from && i.start && i.start < from) return false;
        if (to && i.start && i.start > to) return false;
        return true;
      });
      rows.innerHTML = '';
      for (const it of filtered) {
        const tr = document.createElement('tr');
        const url = 'config.cgi?action=recording&file=' + encodeURIComponent(it.path);
        tr.innerHTML =
          `<td>${escapeHtml(it.stream)}</td>` +
          `<td>${fmtTime(it.start)}</td>` +
          `<td class="end">${fmtTime(it.end)}</td>` +
          `<td class="size">${fmtSize(it.size)}</td>` +
          `<td class="actions"></td>`;
        const actions = tr.querySelector('.actions');
        const play = document.createElement('button');
        play.textContent = 'Play';
        play.className = 'primary';
        play.onclick = () => playRecording(it, url);
        const dl = document.createElement('a');
        dl.textContent = 'Download';
        dl.href = url;
        dl.setAttribute('download', it.path.split('/').pop());
        dl.style.marginLeft = '8px';
        dl.style.fontSize = '12.5px';
        const del = document.createElement('button');
        del.textContent = 'Delete';
        del.className = 'danger';
        del.style.marginLeft = '8px';
        del.onclick = () => deleteRecording(it);
        actions.appendChild(play);
        actions.appendChild(dl);
        actions.appendChild(del);
        rows.appendChild(tr);
      }
      emptyEl.style.display = filtered.length ? 'none' : 'block';
    }

    // ----- Playback -------------------------------------------------------
    // MediaMTX records fragmented MP4 with an "empty moov" (no duration in the
    // header) and no trailing index, so a native <video src> has to download
    // the whole file (up to ~1 GB) before it can start or seek. Instead we play
    // through Media Source Extensions: the server's action=fragidx gives the
    // init-segment size, duration, codec and a keyframe index, and we append
    // only the bytes currently needed, evicting old data to stay within quota.

    const MSE_CHUNK  = 1 << 20; // 1 MiB fetch granularity
    const MSE_AHEAD  = 25;      // seconds of buffer to keep ahead of playhead
    const MSE_BEHIND = 30;      // seconds of buffer to keep behind playhead

    let mseSession = null;

    function destroyMse() {
      const s = mseSession;
      if (!s) return;
      mseSession = null;
      s.stopped = true;
      try { s.abort(); } catch (e) {}
      player.onseeking = null;
      player.ontimeupdate = null;
      if (s.objectUrl) { try { URL.revokeObjectURL(s.objectUrl); } catch (e) {} }
    }

    function bufferedEndAt(sb, t) {
      for (let i = 0; i < sb.buffered.length; i++) {
        if (t >= sb.buffered.start(i) - 0.25 && t <= sb.buffered.end(i) + 0.25)
          return sb.buffered.end(i);
      }
      return t;
    }

    function isBuffered(sb, t) {
      for (let i = 0; i < sb.buffered.length; i++) {
        if (t >= sb.buffered.start(i) && t < sb.buffered.end(i) - 0.1) return true;
      }
      return false;
    }

    function playNative(url) {
      destroyMse();
      player.src = url;
      player.play().catch(() => {});
    }

    async function playRecording(it, url) {
      tlDetach(); // file playback: the timeline playhead no longer applies
      playName.textContent = it.stream + '  -  ' + fmtTime(it.start);
      playerWrap.classList.add('open');
      playerWrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

      destroyMse();
      player.removeAttribute('src');
      player.load();

      if (!('MediaSource' in window)) { playNative(url); return; }

      const idxUrl = 'config.cgi?action=fragidx&file=' + encodeURIComponent(it.path);
      let idx;
      try {
        const res = await fetch(idxUrl, { cache: 'no-store' });
        idx = await res.json();
      } catch (e) { playNative(url); return; }

      if (!idx || !idx.ok || !idx.codecs || !idx.init ||
          !Array.isArray(idx.frags) || idx.frags.length === 0) {
        playNative(url); return;
      }
      const mime = 'video/mp4; codecs="' + idx.codecs + '"';
      if (!MediaSource.isTypeSupported(mime)) { playNative(url); return; }

      startMse(url, idx, mime);
    }

    function startMse(url, idx, mime) {
      const ms = new MediaSource();
      const s = {
        url, idx, ms, sb: null,
        fetchOff: idx.init, stopped: false, pumping: false, pumpPromise: null,
        seekToken: 0, opChain: Promise.resolve(), ac: null, objectUrl: null,
      };
      mseSession = s;

      // Byte offset of the last keyframe at or before time t.
      s.offsetForTime = (t) => {
        const fr = idx.frags;
        let lo = 0, hi = fr.length - 1, ans = 0;
        while (lo <= hi) {
          const m = (lo + hi) >> 1;
          if (fr[m][0] <= t) { ans = m; lo = m + 1; } else hi = m - 1;
        }
        return fr[ans][1];
      };

      s.abort = () => { if (s.ac) { try { s.ac.abort(); } catch (e) {} s.ac = null; } };

      s.fetchRange = async (a, b) => {
        s.ac = new AbortController();
        const res = await fetch(url, {
          headers: { Range: 'bytes=' + a + '-' + b },
          signal: s.ac.signal, cache: 'no-store',
        });
        const buf = new Uint8Array(await res.arrayBuffer());
        s.ac = null;
        return buf;
      };

      // Serialise every SourceBuffer mutation: each op waits for the previous
      // to fire updateend so we never touch the buffer while it is updating.
      s.sbOp = (fn) => {
        s.opChain = s.opChain.then(() => new Promise((resolve, reject) => {
          if (s.stopped || !s.sb) return resolve();
          const sb = s.sb;
          const done = () => { sb.removeEventListener('updateend', done); sb.removeEventListener('error', err); resolve(); };
          const err  = () => { sb.removeEventListener('updateend', done); sb.removeEventListener('error', err); reject(new Error('SourceBuffer error')); };
          sb.addEventListener('updateend', done);
          sb.addEventListener('error', err);
          try { fn(sb); } catch (e) { sb.removeEventListener('updateend', done); sb.removeEventListener('error', err); reject(e); }
        }));
        return s.opChain;
      };

      s.objectUrl = URL.createObjectURL(ms);
      player.src = s.objectUrl;

      ms.addEventListener('sourceopen', async () => {
        if (s.stopped) return;
        try {
          s.sb = ms.addSourceBuffer(mime);
          try { s.sb.mode = 'segments'; } catch (e) {}
          if (idx.duration > 0) { try { ms.duration = idx.duration; } catch (e) {} }
          const init = await s.fetchRange(0, idx.init - 1);
          if (s.stopped) return;
          await s.sbOp((sb) => sb.appendBuffer(init));
          s.fetchOff = idx.init;
          pumpMse(s);
          player.play().catch(() => {});
        } catch (e) {
          if (!s.stopped) playNative(url);
        }
      });

      player.onseeking = () => onMseSeek(s);
      player.ontimeupdate = () => { if (!s.pumping) pumpMse(s); };
    }

    function pumpMse(s) {
      if (s.stopped || s.pumping || !s.sb) return s.pumpPromise || Promise.resolve();
      s.pumping = true;
      const gen = s.seekToken; // a seek bumps seekToken and stops this pump
      s.pumpPromise = (async () => {
        try {
          while (!s.stopped && s.seekToken === gen) {
            const ct = player.currentTime;
            if (bufferedEndAt(s.sb, ct) - ct > MSE_AHEAD) break; // enough ahead
            if (s.fetchOff >= s.idx.size) {                       // reached EOF
              try { if (s.ms.readyState === 'open') s.ms.endOfStream(); } catch (e) {}
              break;
            }
            const a = s.fetchOff;
            const b = Math.min(s.idx.size - 1, a + MSE_CHUNK - 1);
            let data;
            try { data = await s.fetchRange(a, b); }
            catch (e) { break; } // aborted by a seek, or a network error
            if (s.stopped || s.seekToken !== gen) break;
            try {
              await s.sbOp((sb) => sb.appendBuffer(data));
            } catch (e) {
              if (e && e.name === 'QuotaExceededError') {
                await evictMse(s, true);
                try { await s.sbOp((sb) => sb.appendBuffer(data)); }
                catch (e2) { break; }
              } else { break; }
            }
            s.fetchOff = b + 1;
            await evictMse(s, false);
          }
        } finally {
          s.pumping = false;
        }
      })();
      return s.pumpPromise;
    }

    async function evictMse(s, aggressive) {
      if (s.stopped || !s.sb || !s.sb.buffered.length) return;
      const ct = player.currentTime;
      const start = s.sb.buffered.start(0);
      const removeEnd = ct - (aggressive ? 5 : MSE_BEHIND);
      if (removeEnd > start + 1) {
        try { await s.sbOp((sb) => sb.remove(start, removeEnd)); } catch (e) {}
      }
    }

    async function onMseSeek(s) {
      if (s.stopped || !s.sb) return;
      const t = player.currentTime;
      if (isBuffered(s.sb, t)) { pumpMse(s); return; }
      const token = ++s.seekToken;
      s.abort();                       // cancel any in-flight fetch
      try { await s.pumpPromise; } catch (e) {} // let the pump fully stop
      try { await s.opChain; } catch (e) {}
      if (s.stopped || token !== s.seekToken) return;
      // Reset the parser so the next append starts a fresh coded-frame group at
      // the new fragment instead of trying to continue the previous one.
      try { s.sb.abort(); } catch (e) {}
      if (s.sb.buffered.length) {      // drop stale ranges to free quota
        const a = s.sb.buffered.start(0);
        const b = s.sb.buffered.end(s.sb.buffered.length - 1);
        try { await s.sbOp((sb) => sb.remove(a, b)); } catch (e) {}
      }
      if (s.stopped || token !== s.seekToken) return;
      s.fetchOff = s.offsetForTime(t); // jump straight to the keyframe
      pumpMse(s);
    }

    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, c =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    // ----- VMS timeline ----------------------------------------------------
    // Time-based view of the recordings: the recorded timespans come from the
    // MediaMTX playback server (proxied by config.cgi as action=timeline), and
    // clicking a moment plays footage extracted by time (action=clip), stitched
    // across segment files by the playback server. Dragging selects a range
    // that can be played or exported as a standard MP4.

    const tlStreamSel = document.getElementById('tlStream');
    const tlDate = document.getElementById('tlDate');
    const tlBar = document.getElementById('tlBar');
    const tlRuler = document.getElementById('tlRuler');
    const tlSel = document.getElementById('tlSel');
    const tlPlayhead = document.getElementById('tlPlayhead');
    const tlMsg = document.getElementById('tlMsg');
    const tlSelBar = document.getElementById('tlSelBar');
    const tlSelInfo = document.getElementById('tlSelInfo');

    const DAY_MS = 86400e3;
    let tlSpans = [];      // [{start:Date, end:Date}] for the selected day
    let tlSelRange = null; // {a:Date, b:Date}
    let tlClip = null;     // {startAbs:ms, stream} while playing from the timeline

    function tlSetMsg(msg, kind) {
      tlMsg.textContent = msg || '';
      tlMsg.className = kind || '';
    }

    function pad2(n) { return String(n).padStart(2, '0'); }

    function tlDayStart() {
      const [y, m, d] = (tlDate.value || '').split('-').map(Number);
      if (!y) return new Date(new Date().setHours(0, 0, 0, 0));
      return new Date(y, m - 1, d);
    }

    function tlSetDay(d) {
      tlDate.value = d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
    }

    function fmtClock(ms) {
      const d = new Date(ms);
      return pad2(d.getHours()) + ':' + pad2(d.getMinutes()) + ':' + pad2(d.getSeconds());
    }

    function fmtDur(sec) {
      sec = Math.round(sec);
      const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
      return (h ? h + 'h ' : '') + (h || m ? m + 'm ' : '') + s + 's';
    }

    async function tlLoadStreams() {
      let names = [];
      try {
        const res = await fetch('config.cgi?action=streams', { cache: 'no-store' });
        const data = await res.json();
        if (Array.isArray(data)) names = data;
      } catch (e) { /* fall back to the file listing below */ }
      for (const s of new Set(items.map(i => i.stream)))
        if (s !== '(root)' && !names.includes(s)) names.push(s);
      names.sort();
      const cur = tlStreamSel.value;
      tlStreamSel.innerHTML = names.map(n => `<option>${escapeHtml(n)}</option>`).join('');
      if (names.includes(cur)) tlStreamSel.value = cur;
    }

    async function tlLoad() {
      tlSpans = [];
      renderTimeline();
      const stream = tlStreamSel.value;
      if (!stream) { tlSetMsg('No recorded streams yet'); return; }
      const d0 = tlDayStart();
      const d1 = new Date(d0.getTime() + DAY_MS);
      const url = 'config.cgi?action=timeline&path=' + encodeURIComponent(stream) +
                  '&start=' + encodeURIComponent(d0.toISOString()) +
                  '&end=' + encodeURIComponent(d1.toISOString());
      try {
        const res = await fetch(url, { cache: 'no-store' });
        const data = await res.json();
        if (!Array.isArray(data)) {
          if (data && /disabled|unreachable/.test(data.error || ''))
            tlSetMsg('Timeline needs the playback server: set "playback: yes" and ' +
                     '"playbackAddress: 127.0.0.1:9996" in Configuration, then Save & Restart.', 'err');
          else
            tlSetMsg('Timeline unavailable: ' + ((data && data.error) || 'unexpected response'), 'err');
          return;
        }
        tlSpans = data.map(t => {
          const s = new Date(t.start);
          return { start: s, end: new Date(s.getTime() + (+t.duration) * 1000) };
        }).filter(sp => sp.end > d0 && sp.start < d1);
        tlSetMsg(tlSpans.length ? '' : 'No recordings on this day');
        renderTimeline();
      } catch (e) {
        tlSetMsg('Timeline failed: ' + e.message, 'err');
      }
    }

    function renderTimeline() {
      tlRuler.innerHTML = '';
      for (let h = 0; h <= 24; h += 3) {
        const s = document.createElement('span');
        s.style.left = (h / 24 * 100) + '%';
        s.textContent = pad2(h % 24) + ':00';
        if (h === 24) s.textContent = '24:00';
        tlRuler.appendChild(s);
      }
      tlBar.querySelectorAll('.tlSpan,.tlTick').forEach(el => el.remove());
      for (let h = 1; h < 24; h++) {
        const t = document.createElement('div');
        t.className = 'tlTick';
        t.style.left = (h / 24 * 100) + '%';
        tlBar.appendChild(t);
      }
      const d0 = tlDayStart().getTime();
      for (const sp of tlSpans) {
        const a = Math.max(sp.start.getTime(), d0);
        const b = Math.min(sp.end.getTime(), d0 + DAY_MS);
        if (b <= a) continue;
        const el = document.createElement('div');
        el.className = 'tlSpan';
        el.style.left = ((a - d0) / DAY_MS * 100) + '%';
        el.style.width = Math.max((b - a) / DAY_MS * 100, 0.15) + '%';
        tlBar.appendChild(el);
      }
      updateSelUi();
      updatePlayhead();
    }

    function tlTimeAt(e) {
      const r = tlBar.getBoundingClientRect();
      const f = Math.min(1, Math.max(0, (e.clientX - r.left) / r.width));
      return new Date(tlDayStart().getTime() + f * DAY_MS);
    }

    let tlDrag = null;
    tlBar.addEventListener('pointerdown', (e) => {
      tlDrag = { x0: e.clientX, t0: tlTimeAt(e), moved: false };
      tlBar.setPointerCapture(e.pointerId);
    });
    tlBar.addEventListener('pointermove', (e) => {
      const t = tlTimeAt(e);
      tlBar.title = fmtClock(t.getTime());
      if (!tlDrag) return;
      if (Math.abs(e.clientX - tlDrag.x0) > 4) tlDrag.moved = true;
      if (tlDrag.moved) {
        tlSelRange = tlDrag.t0 <= t ? { a: tlDrag.t0, b: t } : { a: t, b: tlDrag.t0 };
        updateSelUi();
      }
    });
    tlBar.addEventListener('pointerup', (e) => {
      if (!tlDrag) return;
      const clicked = !tlDrag.moved;
      tlDrag = null;
      if (clicked) {
        tlSelRange = null;
        updateSelUi();
        tlPlayAt(tlTimeAt(e));
      }
    });

    function spanAt(t) { return tlSpans.find(sp => t >= sp.start && t < sp.end); }
    function nextSpan(t) {
      return tlSpans.filter(sp => sp.start > t).sort((a, b) => a.start - b.start)[0];
    }

    function tlPlayAt(t) {
      let sp = spanAt(t);
      if (!sp) {
        sp = nextSpan(t);
        if (!sp) { tlSetMsg('No recording at or after that time'); return; }
        t = sp.start;
      }
      tlStartClip(t, Math.max(1, (sp.end - t) / 1000), false);
    }

    function clipUrl(stream, t, durSec, format) {
      return 'config.cgi?action=clip&path=' + encodeURIComponent(stream) +
             '&start=' + encodeURIComponent(t.toISOString()) +
             '&duration=' + Math.ceil(durSec) +
             '&format=' + format;
    }

    function tlStartClip(t, durSec, isSelection) {
      const stream = tlStreamSel.value;
      if (!stream) return;
      destroyMse();
      player.removeAttribute('src');
      player.load();
      player.src = clipUrl(stream, t, durSec, 'fmp4');
      tlClip = { startAbs: t.getTime(), stream };
      playName.textContent = stream + '  -  ' + fmtTime(t);
      playerWrap.classList.add('open');
      player.ontimeupdate = updatePlayhead;
      player.onended = () => {
        if (isSelection || !tlClip) return;
        // ran to the end of a recorded span: jump the gap to the next one
        const endAbs = new Date(tlClip.startAbs + player.currentTime * 1000 + 1000);
        const n = nextSpan(endAbs);
        if (n) tlPlayAt(n.start);
      };
      player.play().catch(() => {});
      tlSetMsg('');
    }

    function tlDetach() {
      tlClip = null;
      tlPlayhead.style.display = 'none';
      player.onended = null;
    }

    function updatePlayhead() {
      if (!tlClip) { tlPlayhead.style.display = 'none'; return; }
      const abs = tlClip.startAbs + player.currentTime * 1000;
      const f = (abs - tlDayStart().getTime()) / DAY_MS;
      if (f < 0 || f > 1 || tlClip.stream !== tlStreamSel.value) {
        tlPlayhead.style.display = 'none';
        return;
      }
      tlPlayhead.style.display = 'block';
      tlPlayhead.style.left = (f * 100) + '%';
    }

    function updateSelUi() {
      if (!tlSelRange) {
        tlSel.style.display = 'none';
        tlSelBar.style.display = 'none';
        return;
      }
      const d0 = tlDayStart().getTime();
      const a = tlSelRange.a.getTime(), b = tlSelRange.b.getTime();
      tlSel.style.display = 'block';
      tlSel.style.left = ((a - d0) / DAY_MS * 100) + '%';
      tlSel.style.width = ((b - a) / DAY_MS * 100) + '%';
      tlSelBar.style.display = 'flex';
      tlSelInfo.textContent = fmtClock(a) + ' – ' + fmtClock(b) +
                              ' (' + fmtDur((b - a) / 1000) + ')';
    }

    document.getElementById('tlSelPlay').onclick = () => {
      if (tlSelRange)
        tlStartClip(tlSelRange.a, (tlSelRange.b - tlSelRange.a) / 1000, true);
    };
    document.getElementById('tlSelDl').onclick = () => {
      if (!tlSelRange) return;
      const url = clipUrl(tlStreamSel.value, tlSelRange.a,
                          (tlSelRange.b - tlSelRange.a) / 1000, 'mp4') + '&download=1';
      const a = document.createElement('a');
      a.href = url;
      document.body.appendChild(a);
      a.click();
      a.remove();
    };
    document.getElementById('tlSelClear').onclick = () => {
      tlSelRange = null;
      updateSelUi();
    };

    function tlShiftDay(delta) {
      const d = tlDayStart();
      d.setDate(d.getDate() + delta);
      tlSetDay(d);
      tlSelRange = null;
      tlLoad();
    }
    document.getElementById('tlPrev').onclick = () => tlShiftDay(-1);
    document.getElementById('tlNext').onclick = () => tlShiftDay(1);
    document.getElementById('tlToday').onclick = () => {
      tlSetDay(new Date());
      tlSelRange = null;
      tlLoad();
    };
    tlDate.onchange = () => { tlSelRange = null; tlLoad(); };
    tlStreamSel.onchange = () => { tlSelRange = null; tlLoad(); };

    document.getElementById('reload').onclick = async () => {
      await load();
      await tlLoadStreams();
      tlLoad();
    };
    document.getElementById('clear').onclick = () => {
      streamSel.value = ''; fromEl.value = ''; toEl.value = ''; render();
    };
    streamSel.onchange = render;
    fromEl.onchange = render;
    toEl.onchange = render;
    document.getElementById('closePlayer').onclick = () => {
      player.pause();
      destroyMse();
      tlDetach();
      player.removeAttribute('src');
      player.load();
      playerWrap.classList.remove('open');
    };

    (async () => {
      tlSetDay(new Date());
      renderTimeline();
      await load();
      await tlLoadStreams();
      tlLoad();
    })();
  </script>
</body>
</html>
